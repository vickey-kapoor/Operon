<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Operon Command Center</title>
  <style>
    :root {
      --bg: #0a0e13; --panel: #111920; --panel2: #161f2a;
      --border: #1e2d3d; --border-active: #2a4a6b;
      --text: #e4ecf4; --muted: #6b839b; --dim: #3a5068;
      --accent: #00d4aa; --accent-dim: rgba(0,212,170,.12);
      --warn: #f5c542; --bad: #ff5f5f; --good: #4ade80;
      --blue: #3b82f6; --purple: #a78bfa;
      font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Header ── */
    .header {
      display: flex; align-items: center; gap: 16px;
      padding: 12px 24px; border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #0f1519, var(--bg));
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, var(--accent), var(--blue)); display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 16px; color: #000; }
    .logo-text { font-size: 16px; font-weight: 700; letter-spacing: .02em; }
    .logo-sub { font-size: 11px; color: var(--muted); margin-left: 8px; }
    .header-status { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: pulse-anim 2s infinite; }
    @keyframes pulse-anim { 0%,100% { opacity:1; box-shadow:0 0 0 0 rgba(0,212,170,.4); } 50% { opacity:.6; box-shadow:0 0 0 6px rgba(0,212,170,0); } }
    .status-text { font-size: 12px; color: var(--muted); }

    /* ── Layout ── */
    .layout { display: grid; grid-template-columns: 320px 1fr; min-height: calc(100vh - 53px); }

    /* ── Sidebar ── */
    .sidebar { border-right: 1px solid var(--border); padding: 16px; overflow-y: auto; background: #0d1117; }
    .section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin: 16px 0 8px; }
    .section-label:first-child { margin-top: 0; }

    /* Launch form */
    .launch-card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
    .launch-card label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 4px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }
    .launch-card input, .launch-card textarea {
      width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); padding: 8px 10px; font-size: 13px; margin-bottom: 10px; resize: none;
      font-family: inherit; outline: none; transition: border-color .2s;
    }
    .launch-card input:focus, .launch-card textarea:focus { border-color: var(--accent); }
    .launch-btn {
      width: 100%; padding: 10px; background: linear-gradient(135deg, var(--accent), #00b894);
      color: #000; font-weight: 700; font-size: 13px; border: none; border-radius: 8px;
      cursor: pointer; letter-spacing: .02em; transition: opacity .2s;
    }
    .launch-btn:hover { opacity: .88; }
    .launch-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* Run list */
    .run-item {
      background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
      padding: 10px 12px; cursor: pointer; margin-bottom: 6px; transition: border-color .2s;
    }
    .run-item:hover { border-color: var(--border-active); }
    .run-item.active { border-color: var(--accent); background: var(--accent-dim); }
    .run-item .run-intent { font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
    .run-item .run-meta { font-size: 11px; color: var(--muted); display: flex; gap: 8px; }
    .badge { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; }
    .badge-running { background: rgba(59,130,246,.2); color: var(--blue); }
    .badge-succeeded { background: rgba(74,222,128,.15); color: var(--good); }
    .badge-failed { background: rgba(255,95,95,.15); color: var(--bad); }
    .badge-pending { background: rgba(107,131,155,.15); color: var(--muted); }
    .badge-waiting_for_user { background: rgba(167,139,250,.2); color: var(--purple); }

    /* Pause banner */
    .pause-banner {
      background: linear-gradient(135deg, rgba(167,139,250,.12), rgba(59,130,246,.08));
      border: 1px solid var(--purple); border-radius: 12px; padding: 20px 24px;
      margin-bottom: 16px; display: flex; align-items: center; gap: 16px;
    }
    .pause-banner .pb-icon { font-size: 32px; }
    .pause-banner .pb-content { flex: 1; }
    .pause-banner .pb-title { font-size: 14px; font-weight: 700; color: var(--purple); margin-bottom: 4px; }
    .pause-banner .pb-message { font-size: 13px; color: var(--muted); }
    .pause-banner .pb-actions { display: flex; gap: 8px; }
    .resume-btn {
      padding: 8px 20px; background: linear-gradient(135deg, var(--accent), #00b894);
      color: #000; font-weight: 700; font-size: 13px; border: none; border-radius: 8px;
      cursor: pointer; letter-spacing: .02em;
    }
    .resume-btn:hover { opacity: .88; }
    .abort-btn {
      padding: 8px 20px; background: rgba(255,95,95,.15); color: var(--bad);
      font-weight: 600; font-size: 13px; border: 1px solid var(--bad); border-radius: 8px;
      cursor: pointer;
    }
    .abort-btn:hover { background: rgba(255,95,95,.25); }

    /* ── Main Content ── */
    .main { padding: 16px 20px; overflow-y: auto; }

    /* Metrics bar */
    .metrics-bar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .metric-card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; min-width: 120px; flex: 1; }
    .metric-card .mc-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; font-weight: 600; }
    .metric-card .mc-value { font-size: 18px; font-weight: 700; margin-top: 4px; }

    /* Step timeline */
    .timeline { display: flex; gap: 4px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
    .step-dot {
      width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; cursor: pointer; border: 2px solid var(--border); background: var(--panel);
      transition: all .2s; position: relative;
    }
    .step-dot:hover { border-color: var(--accent); transform: scale(1.08); }
    .step-dot.active { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }
    .step-dot.success { border-color: var(--good); color: var(--good); }
    .step-dot.failure { border-color: var(--bad); color: var(--bad); }
    .step-dot.partial { border-color: var(--warn); color: var(--warn); }
    .step-connector { width: 12px; height: 2px; background: var(--border); }

    /* Screenshot area */
    .screenshot-section { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .screenshot-card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .screenshot-card .sc-header { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); padding: 8px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 6px; }
    .screenshot-card .sc-header .dot { width: 6px; height: 6px; border-radius: 50%; }
    .screenshot-card .sc-body { position: relative; min-height: 200px; background: #080c10; }
    .screenshot-card .sc-body img { width: 100%; display: block; }
    .screenshot-card .sc-body .empty { padding: 40px; text-align: center; color: var(--dim); font-size: 13px; }

    /* Detail panels */
    .detail-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
    .detail-panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
    .detail-panel h3 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--accent); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
    .detail-panel h3 .icon { font-size: 14px; }
    .detail-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(30,45,61,.5); font-size: 12px; }
    .detail-row:last-child { border: none; }
    .detail-row .dr-key { color: var(--muted); }
    .detail-row .dr-val { color: var(--text); font-weight: 500; text-align: right; max-width: 60%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Elements & Events */
    .bottom-grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 12px; }
    .bottom-panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .bottom-panel h3 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--accent); padding: 10px 14px; border-bottom: 1px solid var(--border); margin: 0; }
    .bottom-panel .bp-body { max-height: 300px; overflow-y: auto; padding: 8px; }
    table { width: 100%; border-collapse: collapse; font-size: 11px; }
    th { text-align: left; padding: 6px 8px; color: var(--muted); font-weight: 600; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--panel); }
    td { padding: 5px 8px; border-bottom: 1px solid rgba(30,45,61,.3); vertical-align: top; }
    tr:hover td { background: rgba(0,212,170,.03); }

    .event-item { padding: 8px 12px; border-bottom: 1px solid rgba(30,45,61,.3); }
    .event-item .ev-step { font-size: 10px; font-weight: 700; color: var(--accent); }
    .event-item .ev-type { font-size: 12px; font-weight: 500; }
    .event-item .ev-detail { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* Overlay boxes on screenshots */
    .overlay-box { position:absolute; border:2px solid var(--muted); box-sizing:border-box; pointer-events:none; border-radius: 3px; }
    .overlay-box.candidate { border-color: var(--warn); }
    .overlay-box.selected { border-color: var(--accent); box-shadow: 0 0 8px rgba(0,212,170,.3); }
    .overlay-box.execution { border-color: var(--bad); }
    .overlay-label { position:absolute; top:-16px; left:0; background:rgba(0,0,0,.8); padding:1px 5px; font-size:9px; white-space:nowrap; border-radius: 3px; }

    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 400px; color: var(--dim); }
    .empty-state .es-icon { font-size: 48px; margin-bottom: 16px; opacity: .5; }
    .empty-state .es-text { font-size: 14px; }

    pre { margin: 0; white-space: pre-wrap; word-break: break-word; font-size: 11px; color: #9ab; font-family: 'JetBrains Mono', 'Fira Code', monospace; }
    .scroll-area { max-height: 180px; overflow-y: auto; }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">
    <div class="logo-icon">O</div>
    <span class="logo-text">Operon</span>
    <span class="logo-sub">Command Center</span>
  </div>
  <div class="header-status">
    <div class="pulse" id="pulseIndicator"></div>
    <span class="status-text" id="headerStatus">Connecting...</span>
  </div>
</div>

<!-- Layout -->
<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="section-label">Launch Task</div>
    <div class="launch-card">
      <label for="intentInput">Intent</label>
      <textarea id="intentInput" rows="3" placeholder="e.g. Fill out the contact form and submit it"></textarea>
      <label for="urlInput">Start URL</label>
      <input id="urlInput" type="text" placeholder="https://example.com" />
      <label for="stepsInput">Max Steps</label>
      <input id="stepsInput" type="number" value="12" min="1" max="50" />
      <button class="launch-btn" id="launchBtn" onclick="launchTask()">Launch Mission</button>
    </div>

    <div class="section-label">Runs</div>
    <div id="runList"></div>
  </aside>

  <!-- Main -->
  <main class="main" id="mainContent">
    <div class="empty-state" id="emptyState">
      <div class="es-icon">&#x1F3AF;</div>
      <div class="es-text">Launch a task or select a run to begin</div>
    </div>
  </main>

</div>

<script>
let selectedRunId = null;
let selectedStepIndex = null;
let autoFollow = true;
let activeRunId = null;

async function fetchJson(url, opts) {
  const res = await fetch(url, opts);
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

function fmt(v) { return v ?? '—'; }
function badgeClass(status) { return 'badge badge-' + (status || 'pending'); }

// ── Launch ──────────────────────────────────────────
async function launchTask() {
  const intent = document.getElementById('intentInput').value.trim();
  const url = document.getElementById('urlInput').value.trim();
  if (!intent) return alert('Please enter an intent');
  const btn = document.getElementById('launchBtn');
  btn.disabled = true;
  btn.textContent = 'Launching...';
  try {
    const resp = await fetchJson('/run-task', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ intent, start_url: url || null }),
    });
    selectedRunId = resp.run_id;
    activeRunId = resp.run_id;
    autoFollow = true;
    selectedStepIndex = null;
    stepLoop(resp.run_id);
    await refresh();
  } catch (e) {
    alert('Launch failed: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Launch Mission';
  }
}

async function stepLoop(runId) {
  while (true) {
    try {
      const resp = await fetchJson('/step', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ run_id: runId }),
      });
      await refresh();
      if (resp.status === 'succeeded' || resp.status === 'failed') {
        activeRunId = null;
        await refresh();
        return;
      }
      if (resp.status === 'waiting_for_user') {
        // Don't clear activeRunId — the run is paused, not finished
        await refresh();
        return;
      }
    } catch (e) {
      activeRunId = null;
      await refresh();
      return;
    }
  }
}

async function resumeRun() {
  if (!selectedRunId) return;
  try {
    const resp = await fetchJson('/resume', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ run_id: selectedRunId }),
    });
    activeRunId = selectedRunId;
    autoFollow = true;
    await refresh();
    stepLoop(selectedRunId);
  } catch (e) {
    alert('Resume failed: ' + e.message);
  }
}

async function abortRun() {
  // For now, we don't have a dedicated abort endpoint — just stop tracking
  activeRunId = null;
  await refresh();
}

// ── Render Runs ─────────────────────────────────────
async function loadRuns() {
  try {
    const data = await fetchJson('/observer/api/runs?limit=30');
    const list = document.getElementById('runList');
    list.innerHTML = '';
    for (const run of data.runs) {
      const div = document.createElement('div');
      div.className = 'run-item' + (run.run_id === selectedRunId ? ' active' : '');
      const isActive = run.run_id === activeRunId;
      div.innerHTML = `
        <div class="run-intent">${isActive ? '&#x25B6; ' : ''}${run.intent}</div>
        <div class="run-meta">
          <span class="${badgeClass(run.status)}">${run.status}</span>
          <span>Step ${run.step_count}</span>
        </div>
      `;
      div.onclick = () => { selectedRunId = run.run_id; selectedStepIndex = null; autoFollow = true; refresh(); };
      list.appendChild(div);
    }
  } catch(e) {}
}

// ── Render Main ─────────────────────────────────────
async function renderMain() {
  if (!selectedRunId) return;
  const main = document.getElementById('mainContent');
  const empty = document.getElementById('emptyState');
  if (empty) empty.style.display = 'none';

  let snapshot;
  try {
    snapshot = await fetchJson(`/observer/api/run/${selectedRunId}`);
  } catch(e) { return; }

  const run = snapshot.run;
  const steps = snapshot.steps || [];
  const preStepFailures = snapshot.pre_step_failures || [];
  const curStep = snapshot.current_step;

  // Auto-follow latest step
  if (autoFollow && curStep) {
    selectedStepIndex = curStep.step_index;
  }

  const viewStep = selectedStepIndex != null
    ? (steps.find(s => s.step_index === selectedStepIndex) || curStep)
    : curStep;

  main.innerHTML = `
    ${renderMetrics(run, steps, preStepFailures)}
    ${renderTimeline(steps, curStep)}
    ${renderScreenshots(viewStep)}
    ${renderDetails(viewStep, snapshot)}
    ${renderBottom(viewStep, snapshot)}
  `;
}

function renderMetrics(run, steps, preStepFailures) {
  const isRunning = run.status === 'running';
  const isPaused = run.status === 'waiting_for_user';
  const statusColor = run.status === 'succeeded' ? 'var(--good)' : run.status === 'failed' ? 'var(--bad)' : isPaused ? 'var(--purple)' : isRunning ? 'var(--blue)' : 'var(--muted)';
  const statusIcon = isPaused ? ' &#x23F8;' : isRunning ? ' &#x25CF;' : '';

  // Find pause reason from the last step's executed action
  let pauseReason = '';
  if (isPaused) {
    const lastStep = steps[steps.length - 1];
    pauseReason = lastStep?.execution?.action?.text || run.stop_reason || 'User input required';
  }

  const pauseBanner = isPaused ? `
    <div class="pause-banner">
      <div class="pb-icon">&#x23F8;</div>
      <div class="pb-content">
        <div class="pb-title">PAUSED — Waiting for User</div>
        <div class="pb-message">${pauseReason}</div>
      </div>
      <div class="pb-actions">
        <button class="resume-btn" onclick="resumeRun()">&#x25B6; Resume</button>
        <button class="abort-btn" onclick="abortRun()">Abort</button>
      </div>
    </div>
  ` : '';

  return `${pauseBanner}<div class="metrics-bar">
    <div class="metric-card"><div class="mc-label">Status</div><div class="mc-value" style="color:${statusColor}">${run.status}${statusIcon}</div></div>
    <div class="metric-card"><div class="mc-label">Steps</div><div class="mc-value">${run.step_count}</div></div>
    <div class="metric-card"><div class="mc-label">Phase</div><div class="mc-value" style="font-size:14px">${fmt(run.current_phase)}</div></div>
    <div class="metric-card"><div class="mc-label">Stop Reason</div><div class="mc-value" style="font-size:13px">${fmt(run.stop_reason)}</div></div>
    <div class="metric-card"><div class="mc-label">Pre-step Failures</div><div class="mc-value">${preStepFailures.length}</div></div>
  </div>`;
}

function renderTimeline(steps, curStep) {
  if (!steps.length && !curStep) return '';
  const allSteps = [...steps];
  if (curStep && curStep.is_partial && !allSteps.find(s => s.step_index === curStep.step_index)) {
    allSteps.push(curStep);
  }
  const chips = allSteps.map((step, i) => {
    const isActive = step.step_index === selectedStepIndex;
    const verification = step.verification;
    let cls = '';
    if (verification) {
      if (verification.status === 'success') cls = 'success';
      else if (verification.status === 'failure') cls = 'failure';
    }
    if (step.is_partial) cls = 'partial';
    if (isActive) cls += ' active';
    const connector = i < allSteps.length - 1 ? '<div class="step-connector"></div>' : '';
    return `<div class="step-dot ${cls}" onclick="selectStep(${step.step_index})" title="Step ${step.step_index}">${step.step_index}</div>${connector}`;
  }).join('');
  return `<div class="timeline">${chips}</div>`;
}

function renderScreenshots(step) {
  const beforePath = step?.before_artifact_path;
  const afterPath = step?.after_artifact_path;
  const dims = step?.before_dimensions || { width: 1280, height: 800 };
  return `<div class="screenshot-section">
    <div class="screenshot-card">
      <div class="sc-header"><div class="dot" style="background:var(--blue)"></div> Before — Step ${step?.step_index || '?'}</div>
      <div class="sc-body" id="beforeWrap">${beforePath
        ? `<img id="beforeImg" src="/observer/api/artifact?path=${encodeURIComponent(beforePath)}" alt="before" data-w="${dims.width}" data-h="${dims.height}" onload="drawOverlays(this, ${JSON.stringify(step?.step_index)})" />`
        : '<div class="empty">No screenshot captured</div>'}</div>
    </div>
    <div class="screenshot-card">
      <div class="sc-header"><div class="dot" style="background:var(--good)"></div> After — Step ${step?.step_index || '?'}</div>
      <div class="sc-body">${afterPath
        ? `<img src="/observer/api/artifact?path=${encodeURIComponent(afterPath)}" alt="after" />`
        : '<div class="empty">No after screenshot</div>'}</div>
    </div>
  </div>`;
}

function renderDetails(step, snapshot) {
  return `<div class="detail-grid">
    ${renderPerceptionPanel(step)}
    ${renderSelectorPanel(step)}
    ${renderExecutionPanel(step, snapshot)}
  </div>`;
}

function renderPerceptionPanel(step) {
  const p = step?.perception;
  const m = p?.metrics || {};
  const rows = p ? [
    ['Page Hint', fmt(m.page_hint)],
    ['Elements', `${fmt(m.total_elements)} total / ${fmt(m.candidate_count)} candidates`],
    ['Interactive', `${fmt(m.interactive_count)} (${fmt(m.labeled_interactive_count)} labeled)`],
    ['Confidence', fmt(p.confidence)],
    ['Quality Gate', fmt(m.quality_gate_failure_reason || 'passed')],
    ['Summary', `<span title="${(p.summary||'').replace(/"/g,'&quot;')}">${(p.summary||'').substring(0,60)}...</span>`],
  ] : [['Status', 'No perception data']];
  return `<div class="detail-panel">
    <h3><span class="icon">&#x1F441;</span> Perception</h3>
    ${rows.map(([k,v]) => `<div class="detail-row"><span class="dr-key">${k}</span><span class="dr-val">${v}</span></div>`).join('')}
    ${p?.retry_log ? `<div style="margin-top:8px"><div class="detail-row"><span class="dr-key">Retry Log</span></div><pre class="scroll-area">${p.retry_log}</pre></div>` : ''}
  </div>`;
}

function renderSelectorPanel(step) {
  const s = step?.selector?.trace;
  const rows = s ? [
    ['Intent', fmt(s.intent?.target_text || s.intent?.action)],
    ['Selected', fmt(s.selected_candidate)],
    ['Score Margin', fmt(s.score_margin)],
    ['Candidates', (s.top_candidates || []).length],
    ['Recovery', s.recovery_attempted ? `Yes (${s.recovery_strategy_used})` : 'No'],
    ['Decision', fmt(s.final_decision)],
    ['Failure', fmt(s.failure_reason)],
  ] : [['Status', 'No selector trace']];
  return `<div class="detail-panel">
    <h3><span class="icon">&#x1F3AF;</span> Selector</h3>
    ${rows.map(([k,v]) => `<div class="detail-row"><span class="dr-key">${k}</span><span class="dr-val">${v}</span></div>`).join('')}
  </div>`;
}

function renderExecutionPanel(step, snapshot) {
  const e = step?.execution;
  const v = step?.verification;
  const r = step?.recovery;
  const pg = step?.progress;
  const rows = [];
  if (e) {
    rows.push(['Action', fmt(e.action?.action_type)]);
    rows.push(['Target', fmt(e.action?.target_element_id)]);
    rows.push(['Text', fmt(e.action?.text)]);
    rows.push(['Detail', fmt(e.detail)]);
    rows.push(['Failure', fmt(e.failure_category)]);
  }
  if (v) {
    rows.push(['Verify', `<span style="color:${v.status==='success'?'var(--good)':'var(--bad)'}">${v.status}</span> — ${v.reason || ''}`]);
  }
  if (r) {
    rows.push(['Recovery', `${r.strategy} — ${r.message || ''}`]);
  }
  if (pg?.state) {
    rows.push(['Progress Streak', fmt(pg.state.no_progress_streak)]);
    rows.push(['Loop Detected', fmt(pg.state.loop_detected)]);
  }
  if (!rows.length) rows.push(['Status', 'No execution data']);
  return `<div class="detail-panel">
    <h3><span class="icon">&#x26A1;</span> Execution & Verify</h3>
    ${rows.map(([k,v]) => `<div class="detail-row"><span class="dr-key">${k}</span><span class="dr-val">${v}</span></div>`).join('')}
  </div>`;
}

function renderBottom(step, snapshot) {
  const elements = step?.perception?.elements || [];
  const events = snapshot.event_log || [];
  const elemRows = elements.map(el => `<tr>
    <td>${el.element_id}</td><td>${el.element_type}</td>
    <td>${el.primary_name}</td><td>${el.name_source}</td>
    <td style="color:${el.is_unlabeled?'var(--warn)':'var(--good)'}">${el.is_unlabeled?'yes':'no'}</td>
    <td style="color:${el.usable_for_targeting?'var(--good)':'var(--muted)'}">${el.usable_for_targeting?'yes':'no'}</td>
  </tr>`).join('');
  const eventItems = events.slice().reverse().map(evt => `<div class="event-item">
    <span class="ev-step">Step ${evt.step_index}</span>
    <div class="ev-type">${evt.event}</div>
    <div class="ev-detail">${evt.detail || ''}</div>
  </div>`).join('');
  return `<div class="bottom-grid">
    <div class="bottom-panel">
      <h3>&#x1F4CB; Perceived Elements (${elements.length})</h3>
      <div class="bp-body">${elements.length ? `<table>
        <thead><tr><th>ID</th><th>Type</th><th>Name</th><th>Source</th><th>Unlabeled</th><th>Usable</th></tr></thead>
        <tbody>${elemRows}</tbody>
      </table>` : '<div style="padding:20px;color:var(--dim);text-align:center">No elements perceived</div>'}</div>
    </div>
    <div class="bottom-panel">
      <h3>&#x1F4E1; Event Feed</h3>
      <div class="bp-body">${eventItems || '<div style="padding:20px;color:var(--dim);text-align:center">No events yet</div>'}</div>
    </div>
  </div>`;
}

// ── Overlays ────────────────────────────────────────
let _cachedSnapshot = null;
function drawOverlays(img, stepIndex) {
  if (!_cachedSnapshot) return;
  const step = (_cachedSnapshot.steps || []).find(s => s.step_index === stepIndex) || _cachedSnapshot.current_step;
  if (!step) return;
  const wrap = img.parentElement;
  const dims = step.before_dimensions || { width: 1280, height: 800 };
  const scaleX = img.clientWidth / dims.width;
  const scaleY = img.clientHeight / dims.height;
  const selector = step.selector?.trace;
  const candidateIds = new Set((selector?.top_candidates || []).map(c => c.element_id));
  const selectedId = selector?.selected_candidate;
  const executionId = step.execution?.action?.target_element_id;
  for (const el of (step.perception?.elements || [])) {
    const box = document.createElement('div');
    box.className = 'overlay-box';
    if (candidateIds.has(el.element_id)) box.classList.add('candidate');
    if (selectedId === el.element_id) box.classList.add('selected');
    if (executionId === el.element_id) box.classList.add('execution');
    box.style.left = `${el.x * scaleX}px`;
    box.style.top = `${el.y * scaleY}px`;
    box.style.width = `${el.width * scaleX}px`;
    box.style.height = `${el.height * scaleY}px`;
    const label = document.createElement('div');
    label.className = 'overlay-label';
    label.textContent = el.primary_name || el.element_id;
    box.appendChild(label);
    wrap.appendChild(box);
  }
}

// ── Navigation ──────────────────────────────────────
function selectStep(idx) {
  selectedStepIndex = idx;
  autoFollow = false;
  refresh();
}

// ── Refresh Loop ────────────────────────────────────
async function refresh() {
  await loadRuns();
  if (selectedRunId) {
    try {
      _cachedSnapshot = await fetchJson(`/observer/api/run/${selectedRunId}`);
    } catch(e) { _cachedSnapshot = null; }
    await renderMain();
  }
  // Update header status
  const statusEl = document.getElementById('headerStatus');
  const pulseEl = document.getElementById('pulseIndicator');
  const currentRun = _cachedSnapshot?.run;
  if (currentRun?.status === 'waiting_for_user') {
    statusEl.textContent = 'Paused — Waiting for user';
    pulseEl.style.background = 'var(--purple)';
    pulseEl.style.animation = 'none';
  } else if (activeRunId) {
    statusEl.textContent = 'Agent executing...';
    pulseEl.style.background = 'var(--blue)';
    pulseEl.style.animation = '';
  } else {
    statusEl.textContent = 'Ready';
    pulseEl.style.background = 'var(--accent)';
    pulseEl.style.animation = '';
  }
}

async function boot() {
  await refresh();
  setInterval(async () => {
    if (selectedRunId) await refresh();
  }, 2000);
}
boot();
</script>
