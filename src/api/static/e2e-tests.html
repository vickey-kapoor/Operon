<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UI Navigator — Live E2E Tests</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0f1117;--surface:#161922;--surface2:#1a1d2e;--border:#1e2130;
      --border2:#2d3148;--blue:#2563eb;--blue-h:#1d4ed8;--text:#e8eaf0;
      --muted:#9ca3af;--dim:#4b5563;--green:#22c55e;--red:#ef4444;--amber:#f59e0b;
    }
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}

    header{display:flex;align-items:center;gap:10px;padding:14px 20px;
      border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
    header h1{font-size:17px;font-weight:600;color:#fff}
    .badge{font-size:11px;padding:2px 8px;border-radius:999px;
      background:#a855f722;color:#c084fc;border:1px solid #a855f744}
    .stats{margin-left:auto;display:flex;gap:14px;font-size:13px}
    .stats .pass{color:var(--green)} .stats .fail{color:var(--red)} .stats .run{color:var(--amber)}

    .main{display:grid;grid-template-columns:380px 1fr;flex:1;overflow:hidden;min-height:0}

    /* Left: test list */
    .left{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--surface)}
    .toolbar{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
    .toolbar button{flex:1;padding:8px 12px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
    .btn-run{background:var(--blue);color:#fff} .btn-run:hover{background:var(--blue-h)}
    .btn-run:disabled{opacity:.5;cursor:not-allowed}
    .btn-stop{background:#dc262622;color:var(--red);border:1px solid #dc262644!important}
    .btn-stop:hover{background:#dc262644}
    .test-list{flex:1;overflow-y:auto;padding:8px}
    .test-item{padding:10px 14px;border-radius:8px;margin-bottom:4px;cursor:pointer;
      border:1px solid transparent;transition:all .15s;font-size:13px}
    .test-item:hover{background:var(--surface2)}
    .test-item.active{border-color:var(--blue);background:var(--surface2)}
    .test-item .name{font-weight:600;margin-bottom:3px}
    .test-item .desc{color:var(--muted);font-size:12px}
    .test-item .icon{float:right;font-size:16px;margin-top:2px}
    .test-item.pass{border-left:3px solid var(--green)}
    .test-item.fail{border-left:3px solid var(--red)}
    .test-item.running{border-left:3px solid var(--amber)}
    .test-item.pending{border-left:3px solid var(--dim)}

    /* Right: live view */
    .right{display:flex;flex-direction:column;overflow:hidden}
    .test-header{padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
    .test-header h2{font-size:15px;font-weight:600;margin-bottom:4px}
    .test-header p{font-size:12px;color:var(--muted)}
    .right-body{flex:1;display:grid;grid-template-rows:1fr auto;overflow:hidden;min-height:0}
    .screenshot-area{display:flex;align-items:center;justify-content:center;overflow:hidden;padding:12px;background:#0a0c12}
    .screenshot-area img{max-width:100%;max-height:100%;object-fit:contain;border-radius:6px;
      border:1px solid var(--border2)}
    .screenshot-area .placeholder{text-align:center;color:var(--dim)}
    .placeholder svg{width:48px;height:48px;opacity:.3;margin-bottom:8px}

    .log-area{border-top:1px solid var(--border);background:var(--surface);
      max-height:220px;overflow-y:auto;padding:10px 16px}
    .log-entry{font-size:12px;padding:6px 0;border-bottom:1px solid var(--border);font-family:monospace;line-height:1.5}
    .log-entry .ts{color:var(--dim);margin-right:8px}
    .log-entry .label{font-weight:600;margin-right:6px}
    .log-entry .label.ok{color:var(--green)} .log-entry .label.err{color:var(--red)}
    .log-entry .label.info{color:var(--blue)} .log-entry .label.step{color:var(--amber)}

    .result-bar{padding:12px 20px;border-top:1px solid var(--border);background:var(--surface);
      font-size:13px;flex-shrink:0}
    .result-bar.success{border-top:2px solid var(--green);color:var(--green)}
    .result-bar.failure{border-top:2px solid var(--red);color:var(--red)}
    .result-bar.running{border-top:2px solid var(--amber);color:var(--amber)}
  </style>
</head>
<body>
<header>
  <h1>UI Navigator</h1>
  <span class="badge">E2E Live Tests</span>
  <div class="stats">
    <span class="pass" id="passCount">0 passed</span>
    <span class="fail" id="failCount">0 failed</span>
    <span class="run" id="runCount">0 running</span>
  </div>
</header>
<div class="main">
  <div class="left">
    <div class="toolbar">
      <button class="btn-run" id="btnRunAll" onclick="runAllTests()">Run All Tests</button>
      <button class="btn-stop" id="btnStop" onclick="stopTests()" style="display:none">Stop</button>
    </div>
    <div class="test-list" id="testList"></div>
  </div>
  <div class="right">
    <div class="test-header" id="testHeader">
      <h2>Select a test or Run All</h2>
      <p>Tests will execute sequentially and stream results live</p>
    </div>
    <div class="right-body">
      <div class="screenshot-area" id="screenshotArea">
        <div class="placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><circle cx="12" cy="20" r="1"/><line x1="12" y1="17" x2="12" y2="19"/></svg>
          <div>Live screenshots will appear here</div>
        </div>
      </div>
      <div class="log-area" id="logArea"></div>
    </div>
    <div class="result-bar" id="resultBar" style="display:none"></div>
  </div>
</div>

<script>
// ─── Test Scenarios ───
const TESTS = [
  {
    id: 'health',
    name: '1. Health Check',
    desc: 'Verify /health returns ok + correct version',
    type: 'api',
    run: async (log) => {
      log('info', 'GET /health');
      const r = await fetch('/health');
      const d = await r.json();
      log('info', `Status: ${d.status}, Version: ${d.version}, Tasks: ${d.total_tasks}`);
      if (d.status !== 'ok') throw new Error('Health status not ok: ' + d.status);
      if (!d.version) throw new Error('Missing version');
      return `Server healthy — v${d.version}`;
    }
  },
  {
    id: 'root',
    name: '2. Root Endpoint',
    desc: 'Verify GET / returns service info with docs/health/ui links',
    type: 'api',
    run: async (log) => {
      log('info', 'GET /');
      const r = await fetch('/');
      const d = await r.json();
      log('info', `Service: ${d.service}, Docs: ${d.docs}, UI: ${d.ui}`);
      if (!d.service || !d.docs || !d.health || !d.ui) throw new Error('Missing root fields');
      return `Root OK — ${d.service} v${d.version}`;
    }
  },
  {
    id: 'clarify',
    name: '3. Clarify Ambiguous Task',
    desc: 'POST /clarify with vague task → get clarifying questions from Gemini',
    type: 'api',
    run: async (log) => {
      log('info', 'POST /clarify — "buy something online"');
      const r = await fetch('/clarify', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({task: 'buy something online'})
      });
      const d = await r.json();
      log('info', `Got ${d.questions.length} clarifying questions`);
      d.questions.forEach((q, i) => log('step', `Q${i+1}: ${q}`));
      if (d.questions.length === 0) throw new Error('No questions returned');
      return `${d.questions.length} clarifying questions generated`;
    }
  },
  {
    id: 'clarify_clear',
    name: '4. Clarify Clear Task',
    desc: 'POST /clarify with a specific task → should return empty questions',
    type: 'api',
    run: async (log) => {
      log('info', 'POST /clarify — "Go to google.com and search for weather in NYC"');
      const r = await fetch('/clarify', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({task: 'Go to google.com and search for weather in NYC'})
      });
      const d = await r.json();
      log('info', `Questions returned: ${d.questions.length}`);
      if (d.questions.length > 0) {
        d.questions.forEach((q, i) => log('step', `Q${i+1}: ${q}`));
        log('info', 'Note: Gemini found room for clarification (acceptable)');
      }
      return `Clear task check done — ${d.questions.length} questions`;
    }
  },
  {
    id: 'navigate_wiki',
    name: '5. Navigate Wikipedia',
    desc: 'POST /navigate → WS stream → agent finds featured article on Wikipedia',
    type: 'agent',
    run: async (log, setScreenshot) => {
      log('info', 'POST /navigate — "Find the featured article title on the Wikipedia main page"');
      const r = await fetch('/navigate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          url: 'https://en.wikipedia.org',
          task: 'Find the featured article title on the main page',
          max_steps: 10
        })
      });
      const { task_id } = await r.json();
      log('info', `Task started: ${task_id.slice(0,8)}…`);
      return await streamTask(task_id, log, setScreenshot);
    }
  },
  {
    id: 'navigate_hn',
    name: '6. Navigate Hacker News',
    desc: 'Agent navigates to Hacker News and reads the top story',
    type: 'agent',
    run: async (log, setScreenshot) => {
      log('info', 'POST /navigate — "What is the #1 story on Hacker News right now?"');
      const r = await fetch('/navigate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          url: 'https://news.ycombinator.com',
          task: 'What is the #1 story on Hacker News right now? Just tell me the title.',
          max_steps: 8
        })
      });
      const { task_id } = await r.json();
      log('info', `Task started: ${task_id.slice(0,8)}…`);
      return await streamTask(task_id, log, setScreenshot);
    }
  },
  {
    id: 'task_list',
    name: '7. List Tasks',
    desc: 'GET /tasks — verify previous tasks are tracked',
    type: 'api',
    run: async (log) => {
      log('info', 'GET /tasks');
      const r = await fetch('/tasks');
      const d = await r.json();
      log('info', `Total tasks: ${d.total}`);
      d.tasks.slice(0, 5).forEach(t => {
        log('step', `${t.task_id.slice(0,8)}… — ${t.status} — "${t.task.slice(0,50)}"`);
      });
      if (d.total === 0) throw new Error('No tasks found — previous tests should have created some');
      return `${d.total} tasks tracked`;
    }
  },
  {
    id: 'task_poll',
    name: '8. Poll Task Status',
    desc: 'GET /tasks/{id} — poll the most recent completed task and verify result',
    type: 'api',
    run: async (log) => {
      log('info', 'GET /tasks — finding latest completed task');
      const r = await fetch('/tasks');
      const d = await r.json();
      const done = d.tasks.find(t => t.status === 'TaskStatus.DONE');
      if (!done) throw new Error('No completed task found');
      log('info', `Polling task: ${done.task_id.slice(0,8)}…`);
      const r2 = await fetch(`/tasks/${done.task_id}`);
      const t = await r2.json();
      log('info', `Status: ${t.status}`);
      log('info', `Result: ${t.result?.result || 'N/A'}`);
      log('info', `Steps: ${t.result?.steps_taken || 'N/A'}`);
      return `Task ${t.task_id.slice(0,8)}… — ${t.result?.result?.slice(0,80) || 'no result'}`;
    }
  },
  {
    id: 'webpilot_session',
    name: '9. WebPilot Session Lifecycle',
    desc: 'Create → connect WS → disconnect → delete WebPilot session',
    type: 'api',
    run: async (log) => {
      log('info', 'POST /webpilot/sessions — creating session');
      const r = await fetch('/webpilot/sessions', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({})
      });
      const { session_id } = await r.json();
      log('info', `Session created: ${session_id.slice(0,8)}…`);

      // Connect WS briefly
      log('info', 'Connecting WebSocket…');
      const wsOk = await new Promise(resolve => {
        const proto = location.protocol === 'https:' ? 'wss' : 'ws';
        const ws = new WebSocket(`${proto}://${location.host}/webpilot/ws/${session_id}`);
        ws.onopen = () => { resolve(true); ws.close(); };
        ws.onerror = () => resolve(false);
        setTimeout(() => resolve(false), 5000);
      });
      log(wsOk ? 'ok' : 'err', `WebSocket ${wsOk ? 'connected' : 'failed'}`);

      // Delete session
      log('info', 'DELETE /webpilot/sessions/' + session_id.slice(0,8) + '…');
      const r2 = await fetch(`/webpilot/sessions/${session_id}`, { method: 'DELETE' });
      const d2 = await r2.json();
      log('ok', `Session deleted: ${d2.status}`);

      if (!wsOk) throw new Error('WebSocket connection failed');
      return 'WebPilot lifecycle OK — create → WS → delete';
    }
  },
  {
    id: 'navigate_cancel',
    name: '10. Start & Cancel Task',
    desc: 'Start a long task, then cancel it via DELETE /tasks/{id}',
    type: 'agent',
    run: async (log, setScreenshot) => {
      log('info', 'POST /navigate — starting cancellable task');
      const r = await fetch('/navigate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          url: 'https://en.wikipedia.org/wiki/Special:Random',
          task: 'Read this article thoroughly and summarize every section in detail',
          max_steps: 20
        })
      });
      const { task_id } = await r.json();
      log('info', `Task started: ${task_id.slice(0,8)}…`);

      // Wait a few seconds to let it start
      log('info', 'Waiting 6s before cancelling…');
      await sleep(6000);

      // Check if task is still running
      const sr = await fetch(`/tasks/${task_id}`);
      const st = await sr.json();
      log('step', `Current status: ${st.status}`);

      if (st.status === 'TaskStatus.RUNNING') {
        log('info', `DELETE /tasks/${task_id.slice(0,8)}…`);
        const cr = await fetch(`/tasks/${task_id}`, { method: 'DELETE' });
        const cd = await cr.json();
        log('ok', `Cancel response: ${cd.message}`);
      } else {
        log('info', 'Task already finished before cancel');
      }

      // Show final screenshot if available
      const fr = await fetch(`/tasks/${task_id}`);
      const ft = await fr.json();
      if (ft.result?.screenshots?.length) {
        setScreenshot('data:image/png;base64,' + ft.result.screenshots[ft.result.screenshots.length - 1]);
      }
      return `Cancel test done — final status: ${ft.status}`;
    }
  },
  {
    id: 'input_validation',
    name: '11. Input Validation',
    desc: 'Verify server rejects invalid inputs (empty task, bad URL, oversized)',
    type: 'api',
    run: async (log) => {
      // Empty task
      log('info', 'POST /navigate with empty task');
      const r1 = await fetch('/navigate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({task: ''})
      });
      log(r1.status === 422 ? 'ok' : 'err', `Empty task → ${r1.status} (expect 422)`);

      // SSRF: localhost URL
      log('info', 'POST /navigate with localhost URL (SSRF check)');
      const r2 = await fetch('/navigate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({task: 'test', start_url: 'http://localhost:8080/health'})
      });
      log(r2.status === 422 ? 'ok' : 'err', `Localhost URL → ${r2.status} (expect 422)`);

      // Oversized task
      log('info', 'POST /navigate with oversized task (>2000 chars)');
      const r3 = await fetch('/navigate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({task: 'x'.repeat(2500)})
      });
      log(r3.status === 422 ? 'ok' : 'err', `Oversized task → ${r3.status} (expect 422)`);

      // Bad model
      log('info', 'POST /navigate with invalid model name');
      const r4 = await fetch('/navigate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({task: 'test', model: 'gpt-4-evil'})
      });
      log(r4.status === 422 ? 'ok' : 'err', `Bad model → ${r4.status} (expect 422)`);

      const allOk = [r1,r2,r3,r4].every(r => r.status === 422);
      if (!allOk) throw new Error('Some validation checks did not return 422');
      return 'All 4 input validations rejected correctly (422)';
    }
  },
  {
    id: 'navigate_search',
    name: '12. Google Search Task',
    desc: 'Agent navigates to Google and searches for "Claude AI"',
    type: 'agent',
    run: async (log, setScreenshot) => {
      log('info', 'POST /navigate — Google search for "Claude AI"');
      const r = await fetch('/navigate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          url: 'https://www.google.com',
          task: 'Search for "Claude AI" and tell me the first result title',
          max_steps: 10
        })
      });
      const { task_id } = await r.json();
      log('info', `Task started: ${task_id.slice(0,8)}…`);
      return await streamTask(task_id, log, setScreenshot);
    }
  },
  {
    id: 'final_health',
    name: '13. Final Health Check',
    desc: 'Verify server is still healthy after all tests',
    type: 'api',
    run: async (log) => {
      log('info', 'GET /health — final check');
      const r = await fetch('/health');
      const d = await r.json();
      log('info', `Status: ${d.status}`);
      log('info', `Active tasks: ${d.active_tasks}`);
      log('info', `Total tasks: ${d.total_tasks}`);
      log('info', `Counts: ${JSON.stringify(d.task_counts)}`);
      if (d.status !== 'ok') throw new Error('Server unhealthy after tests');
      return `Server healthy — ${d.total_tasks} total tasks, ${d.active_tasks} active`;
    }
  },
];

// ─── Helpers ───
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function streamTask(taskId, log, setScreenshot) {
  return new Promise((resolve, reject) => {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${proto}://${location.host}/ws/${taskId}`);
    const timeout = setTimeout(() => { ws.close(); reject(new Error('WS timeout after 90s')); }, 90000);

    ws.onmessage = ({ data }) => {
      const ev = JSON.parse(data);
      if (ev.type === 'step') {
        log('step', `Step ${ev.step}: ${ev.action}`);
        if (ev.observation) log('info', ev.observation.slice(0, 120));
        if (ev.screenshot) setScreenshot('data:image/png;base64,' + ev.screenshot);
      } else if (ev.type === 'done') {
        clearTimeout(timeout);
        ws.close();
        if (ev.success) {
          log('ok', `Done in ${ev.steps_taken} steps: ${ev.result?.slice(0, 150) || 'completed'}`);
          resolve(`Done in ${ev.steps_taken} steps — ${ev.result?.slice(0, 100) || 'success'}`);
        } else {
          log('err', `Failed: ${ev.error || 'unknown'}`);
          reject(new Error(ev.error || 'Task failed'));
        }
      } else if (ev.type === 'error') {
        clearTimeout(timeout);
        ws.close();
        log('err', ev.message);
        reject(new Error(ev.message));
      }
    };
    ws.onerror = () => { clearTimeout(timeout); reject(new Error('WebSocket error')); };
  });
}

// ─── State ───
let running = false;
let stopRequested = false;
let passed = 0, failed = 0, runningCount = 0;
const results = {};

// ─── UI ───
function renderTestList() {
  const el = document.getElementById('testList');
  el.innerHTML = TESTS.map(t => {
    const st = results[t.id]?.status || 'pending';
    return `<div class="test-item ${st} ${selectedTest === t.id ? 'active' : ''}"
                 onclick="selectTest('${t.id}')" id="item-${t.id}">
      <span class="icon">${st === 'pass' ? '✓' : st === 'fail' ? '✗' : st === 'running' ? '◌' : '○'}</span>
      <div class="name">${t.name}</div>
      <div class="desc">${t.desc}</div>
      ${results[t.id]?.summary ? `<div style="color:${st==='pass'?'var(--green)':'var(--red)'};font-size:11px;margin-top:4px">${results[t.id].summary.slice(0,80)}</div>` : ''}
    </div>`;
  }).join('');
}

let selectedTest = null;
function selectTest(id) {
  selectedTest = id;
  renderTestList();
  const t = TESTS.find(x => x.id === id);
  const r = results[id];
  document.getElementById('testHeader').innerHTML = `
    <h2>${t.name}</h2>
    <p>${t.desc} ${r?.summary ? '— ' + r.summary : ''}</p>`;
  // Show logs for this test
  const logArea = document.getElementById('logArea');
  logArea.innerHTML = (r?.logs || []).map(l =>
    `<div class="log-entry"><span class="ts">${l.ts}</span><span class="label ${l.level}">${l.level.toUpperCase()}</span>${l.msg}</div>`
  ).join('');
  logArea.scrollTop = logArea.scrollHeight;
  // Show screenshot
  if (r?.screenshot) {
    document.getElementById('screenshotArea').innerHTML = `<img src="${r.screenshot}" alt="screenshot"/>`;
  }
}

function updateStats() {
  document.getElementById('passCount').textContent = passed + ' passed';
  document.getElementById('failCount').textContent = failed + ' failed';
  document.getElementById('runCount').textContent = runningCount + ' running';
}

// ─── Runner ───
async function runAllTests() {
  if (running) return;
  running = true; stopRequested = false;
  passed = 0; failed = 0; runningCount = 0;
  Object.keys(results).forEach(k => delete results[k]);

  document.getElementById('btnRunAll').disabled = true;
  document.getElementById('btnStop').style.display = '';
  renderTestList(); updateStats();

  for (const test of TESTS) {
    if (stopRequested) break;

    results[test.id] = { status: 'running', logs: [], screenshot: null, summary: '' };
    runningCount = 1;
    selectedTest = test.id;
    renderTestList(); updateStats();
    selectTest(test.id);

    const addLog = (level, msg) => {
      const entry = { ts: new Date().toLocaleTimeString(), level, msg };
      results[test.id].logs.push(entry);
      if (selectedTest === test.id) {
        const logArea = document.getElementById('logArea');
        logArea.innerHTML += `<div class="log-entry"><span class="ts">${entry.ts}</span><span class="label ${level}">${level.toUpperCase()}</span>${msg}</div>`;
        logArea.scrollTop = logArea.scrollHeight;
      }
    };
    const setScreenshot = (src) => {
      results[test.id].screenshot = src;
      if (selectedTest === test.id) {
        document.getElementById('screenshotArea').innerHTML = `<img src="${src}" alt="screenshot"/>`;
      }
    };

    try {
      const summary = await test.run(addLog, setScreenshot);
      results[test.id].status = 'pass';
      results[test.id].summary = summary;
      addLog('ok', '✓ PASSED — ' + summary);
      passed++;
    } catch (e) {
      results[test.id].status = 'fail';
      results[test.id].summary = e.message;
      addLog('err', '✗ FAILED — ' + e.message);
      failed++;
    }
    runningCount = 0;
    renderTestList(); updateStats();

    // Brief pause between tests
    if (!stopRequested) await sleep(1000);
  }

  running = false;
  document.getElementById('btnRunAll').disabled = false;
  document.getElementById('btnStop').style.display = 'none';

  const bar = document.getElementById('resultBar');
  bar.style.display = '';
  bar.className = 'result-bar ' + (failed === 0 ? 'success' : 'failure');
  bar.textContent = `All tests complete — ${passed} passed, ${failed} failed out of ${TESTS.length}`;
}

function stopTests() {
  stopRequested = true;
  document.getElementById('btnStop').style.display = 'none';
}

// Init
renderTestList();
updateStats();
</script>
</body>
</html>
