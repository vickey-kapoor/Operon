<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UI Navigator — Visual Test Runner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080b12;
      --surface: #0d1019;
      --surface2: #111620;
      --surface3: #151b28;
      --border: #1a2235;
      --border2: #243050;
      --cyan: #00e5ff;
      --cyan-dim: #00a5b8;
      --cyan-glow: #00e5ff33;
      --green: #00ff88;
      --green-dim: #00cc6a;
      --green-glow: #00ff8822;
      --red: #ff3366;
      --red-dim: #cc2952;
      --red-glow: #ff336622;
      --amber: #ffaa00;
      --amber-dim: #cc8800;
      --amber-glow: #ffaa0022;
      --blue: #4488ff;
      --blue-glow: #4488ff22;
      --text: #c8d0e0;
      --text-bright: #e8edf5;
      --muted: #5a6580;
      --dim: #3a4560;
      --mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
      --sans: 'Outfit', -apple-system, sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
    }

    /* Scan line overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 229, 255, 0.008) 2px,
        rgba(0, 229, 255, 0.008) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ─── Header ─── */
    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }

    header::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--cyan-dim), transparent);
      opacity: 0.4;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      border: 2px solid var(--cyan);
      border-radius: 6px;
      display: grid;
      place-items: center;
      font-size: 13px;
      font-weight: 700;
      color: var(--cyan);
      font-family: var(--mono);
      box-shadow: 0 0 12px var(--cyan-glow), inset 0 0 8px var(--cyan-glow);
    }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-bright);
      letter-spacing: -0.02em;
    }

    header h1 span {
      color: var(--muted);
      font-weight: 400;
    }

    .tag {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 4px;
      background: var(--cyan-glow);
      color: var(--cyan);
      border: 1px solid var(--cyan-dim);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .header-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .stats {
      display: flex;
      gap: 18px;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .stat-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }

    .stat-dot.green { background: var(--green); box-shadow: 0 0 6px var(--green-glow); }
    .stat-dot.red { background: var(--red); box-shadow: 0 0 6px var(--red-glow); }
    .stat-dot.amber { background: var(--amber); box-shadow: 0 0 6px var(--amber-glow); }

    .stat-val { color: var(--text-bright); }
    .stat-label { color: var(--muted); }

    .btn-run {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 600;
      padding: 8px 20px;
      border: 1px solid var(--cyan-dim);
      border-radius: 6px;
      background: linear-gradient(135deg, rgba(0,229,255,0.12), rgba(0,229,255,0.04));
      color: var(--cyan);
      cursor: pointer;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .btn-run:hover {
      background: linear-gradient(135deg, rgba(0,229,255,0.22), rgba(0,229,255,0.08));
      box-shadow: 0 0 20px var(--cyan-glow);
    }

    .btn-run:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      box-shadow: none;
    }

    .btn-run:active:not(:disabled) {
      transform: scale(0.97);
    }

    /* ─── Main ─── */
    .main {
      display: grid;
      grid-template-columns: 360px 1fr;
      flex: 1;
      overflow: hidden;
      min-height: 0;
      position: relative;
      z-index: 1;
    }

    /* ─── Left Panel ─── */
    .left {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--surface);
    }

    .panel-label {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 14px 18px 10px;
      flex-shrink: 0;
    }

    .test-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 10px 10px;
    }

    .test-list::-webkit-scrollbar { width: 4px; }
    .test-list::-webkit-scrollbar-track { background: transparent; }
    .test-list::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

    .test-item {
      padding: 12px 14px;
      border-radius: 8px;
      margin-bottom: 3px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.2s;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      position: relative;
    }

    .test-item:hover { background: var(--surface2); }

    .test-item.active {
      border-color: var(--border2);
      background: var(--surface3);
    }

    .test-item.active::before {
      content: '';
      position: absolute;
      left: 0;
      top: 8px;
      bottom: 8px;
      width: 2px;
      border-radius: 1px;
      background: var(--cyan);
      box-shadow: 0 0 6px var(--cyan-glow);
    }

    .test-icon {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      font-size: 12px;
      font-family: var(--mono);
      font-weight: 700;
      margin-top: 1px;
      transition: all 0.3s;
    }

    .test-icon.pending {
      background: var(--surface3);
      border: 1px solid var(--dim);
      color: var(--dim);
    }

    .test-icon.running {
      background: var(--amber-glow);
      border: 1px solid var(--amber-dim);
      color: var(--amber);
      animation: pulse-amber 1.5s ease-in-out infinite;
    }

    .test-icon.pass {
      background: var(--green-glow);
      border: 1px solid var(--green-dim);
      color: var(--green);
    }

    .test-icon.fail {
      background: var(--red-glow);
      border: 1px solid var(--red-dim);
      color: var(--red);
    }

    @keyframes pulse-amber {
      0%, 100% { box-shadow: 0 0 0 0 var(--amber-glow); }
      50% { box-shadow: 0 0 12px 2px var(--amber-glow); }
    }

    .test-info { flex: 1; min-width: 0; }

    .test-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-bright);
      margin-bottom: 3px;
      letter-spacing: -0.01em;
    }

    .test-desc {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.4;
    }

    .test-duration {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--dim);
      flex-shrink: 0;
      margin-top: 4px;
      min-width: 50px;
      text-align: right;
    }

    .test-duration.done { color: var(--muted); }

    /* ─── Right Panel ─── */
    .right {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    .log-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px 10px;
      flex-shrink: 0;
    }

    .log-header .panel-label { padding: 0; }

    .log-test-name {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--cyan);
      font-weight: 500;
    }

    .log-container {
      flex: 1;
      overflow-y: auto;
      padding: 0 20px 20px;
      scroll-behavior: smooth;
    }

    .log-container::-webkit-scrollbar { width: 4px; }
    .log-container::-webkit-scrollbar-track { background: transparent; }
    .log-container::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

    .log-entry {
      display: flex;
      gap: 10px;
      padding: 6px 0;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.5;
      border-bottom: 1px solid var(--border);
      animation: log-in 0.25s ease-out;
    }

    @keyframes log-in {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .log-time {
      color: var(--dim);
      flex-shrink: 0;
      font-size: 11px;
      min-width: 70px;
      padding-top: 1px;
    }

    .log-tag {
      flex-shrink: 0;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 3px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      min-width: 64px;
      text-align: center;
    }

    .log-tag.thinking { background: var(--amber-glow); color: var(--amber); border: 1px solid rgba(255,170,0,0.2); }
    .log-tag.action { background: var(--blue-glow); color: var(--blue); border: 1px solid rgba(68,136,255,0.2); }
    .log-tag.done { background: var(--green-glow); color: var(--green); border: 1px solid rgba(0,255,136,0.2); }
    .log-tag.stopped { background: rgba(100,120,150,0.15); color: #8899aa; border: 1px solid rgba(100,120,150,0.2); }
    .log-tag.error { background: var(--red-glow); color: var(--red); border: 1px solid rgba(255,51,102,0.2); }
    .log-tag.send { background: rgba(0,229,255,0.08); color: var(--cyan-dim); border: 1px solid rgba(0,229,255,0.15); }
    .log-tag.recv { background: rgba(0,229,255,0.08); color: var(--cyan); border: 1px solid rgba(0,229,255,0.15); }
    .log-tag.http { background: rgba(140,100,255,0.1); color: #aa88ff; border: 1px solid rgba(140,100,255,0.2); }
    .log-tag.info { background: rgba(100,120,150,0.1); color: var(--muted); border: 1px solid rgba(100,120,150,0.15); }
    .log-tag.pass { background: var(--green-glow); color: var(--green); border: 1px solid rgba(0,255,136,0.2); }
    .log-tag.fail { background: var(--red-glow); color: var(--red); border: 1px solid rgba(255,51,102,0.2); }
    .log-tag.confirm { background: rgba(140,100,255,0.1); color: #cc88ff; border: 1px solid rgba(140,100,255,0.2); }
    .log-tag.interrupt { background: rgba(255,170,0,0.1); color: var(--amber); border: 1px solid rgba(255,170,0,0.15); }

    .log-msg {
      color: var(--text);
      word-break: break-all;
      flex: 1;
    }

    .log-msg code {
      background: var(--surface2);
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 11px;
      color: var(--text-bright);
    }

    /* ─── Summary Banner ─── */
    .summary-banner {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 10px 24px;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      position: relative;
      z-index: 10;
      animation: banner-in 0.4s ease-out;
    }

    .summary-banner.visible { display: flex; }

    .summary-banner.all-pass {
      background: linear-gradient(90deg, rgba(0,255,136,0.06), rgba(0,255,136,0.02));
      color: var(--green);
      border-bottom-color: rgba(0,255,136,0.15);
    }

    .summary-banner.has-fail {
      background: linear-gradient(90deg, rgba(255,51,102,0.06), rgba(255,51,102,0.02));
      color: var(--red);
      border-bottom-color: rgba(255,51,102,0.15);
    }

    @keyframes banner-in {
      from { opacity: 0; transform: translateY(-100%); }
      to { opacity: 1; transform: translateY(0); }
    }

    .summary-banner .summary-text { letter-spacing: 0.06em; text-transform: uppercase; }
    .summary-banner .summary-detail { color: var(--muted); font-weight: 400; font-size: 12px; }

    /* ─── Empty state ─── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--dim);
      font-size: 13px;
      gap: 8px;
    }

    .empty-state .empty-icon {
      font-size: 36px;
      opacity: 0.3;
      margin-bottom: 4px;
    }

    .empty-state .empty-hint {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--dim);
    }

    /* ─── Spinner for running icon ─── */
    @keyframes spin { to { transform: rotate(360deg); } }

    .test-icon.running::after {
      content: '';
      position: absolute;
      inset: -3px;
      border: 2px solid transparent;
      border-top-color: var(--amber);
      border-radius: 8px;
      animation: spin 0.8s linear infinite;
    }

    .test-icon { position: relative; }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <div class="logo-icon">UI</div>
      <h1>Visual Test Runner <span>— UI Navigator</span></h1>
    </div>
    <div class="tag">v1.4.0</div>
    <div class="header-actions">
      <div class="stats">
        <div class="stat">
          <div class="stat-dot green"></div>
          <span class="stat-val" id="passCount">0</span>
          <span class="stat-label">pass</span>
        </div>
        <div class="stat">
          <div class="stat-dot red"></div>
          <span class="stat-val" id="failCount">0</span>
          <span class="stat-label">fail</span>
        </div>
        <div class="stat">
          <div class="stat-dot amber"></div>
          <span class="stat-val" id="runCount">0</span>
          <span class="stat-label">run</span>
        </div>
      </div>
      <button class="btn-run" id="btnRun" onclick="runAll()">&#9654; Run All</button>
    </div>
  </header>

  <div class="summary-banner" id="summaryBanner">
    <span class="summary-text" id="summaryText"></span>
    <span class="summary-detail" id="summaryDetail"></span>
  </div>

  <div class="main">
    <div class="left">
      <div class="panel-label">Test Suite &middot; 10 scenarios</div>
      <div class="test-list" id="testList"></div>
    </div>
    <div class="right">
      <div class="log-header">
        <div class="panel-label">Live Log</div>
        <div class="log-test-name" id="logTestName"></div>
      </div>
      <div class="log-container" id="logContainer">
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">&#9678;</div>
          <div>No test selected</div>
          <div class="empty-hint">Click Run All or select a test</div>
        </div>
      </div>
    </div>
  </div>

<script>
const BASE = window.location.origin;
const B64_PNG = "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg==";

const TESTS = [
  { id: 'health',     name: '1. Health Endpoint',           desc: 'GET /health — verify JSON response' },
  { id: 'docs',       name: '2. Swagger UI',                desc: 'GET /docs — verify page loads' },
  { id: 'session',    name: '3. Create WebPilot Session',   desc: 'POST /webpilot/sessions — get session_id' },
  { id: 'lifecycle',  name: '4. WS Task Lifecycle',         desc: 'task → thinking → action → screenshot → done' },
  { id: 'stop',       name: '5. WS Stop Mid-Task',          desc: 'Send stop after first action' },
  { id: 'confirm',    name: '6. WS Confirm Flow',           desc: 'Full lifecycle with confirm handler' },
  { id: 'interrupt',  name: '7. Interrupt Flow (Redirect)',  desc: 'Send interrupt, verify replan' },
  { id: 'delete',     name: '8. Delete Session',            desc: 'Create + delete, verify status codes' },
  { id: 'concurrent', name: '9. Concurrent Sessions',       desc: '3 parallel WS tasks completing' },
  { id: 'malformed',  name: '10. Malformed JSON',           desc: 'Send garbage — expect error, not crash' },
];

let state = TESTS.map(t => ({ ...t, status: 'pending', duration: null, logs: [] }));
let activeIdx = -1;
let running = false;

// ─── Render ───
const $list = document.getElementById('testList');
const $log = document.getElementById('logContainer');
const $logName = document.getElementById('logTestName');
const $pass = document.getElementById('passCount');
const $fail = document.getElementById('failCount');
const $run = document.getElementById('runCount');
const $btn = document.getElementById('btnRun');
const $empty = document.getElementById('emptyState');
const $banner = document.getElementById('summaryBanner');
const $bannerText = document.getElementById('summaryText');
const $bannerDetail = document.getElementById('summaryDetail');

function renderList() {
  $list.innerHTML = state.map((t, i) => `
    <div class="test-item ${i === activeIdx ? 'active' : ''}" onclick="selectTest(${i})">
      <div class="test-icon ${t.status}">
        ${t.status === 'pending' ? '○' : t.status === 'running' ? '⟳' : t.status === 'pass' ? '✓' : '✗'}
      </div>
      <div class="test-info">
        <div class="test-name">${t.name}</div>
        <div class="test-desc">${t.desc}</div>
      </div>
      <div class="test-duration ${t.duration !== null ? 'done' : ''}">${t.duration !== null ? t.duration + 'ms' : ''}</div>
    </div>
  `).join('');

  const pass = state.filter(t => t.status === 'pass').length;
  const fail = state.filter(t => t.status === 'fail').length;
  const run = state.filter(t => t.status === 'running').length;
  $pass.textContent = pass;
  $fail.textContent = fail;
  $run.textContent = run;
}

function renderLog() {
  if (activeIdx < 0) {
    $empty.style.display = '';
    $logName.textContent = '';
    // Clear all log entries but keep empty state
    const entries = $log.querySelectorAll('.log-entry');
    entries.forEach(e => e.remove());
    return;
  }

  $empty.style.display = 'none';
  const t = state[activeIdx];
  $logName.textContent = t.name;

  // Clear and re-render
  const entries = $log.querySelectorAll('.log-entry');
  entries.forEach(e => e.remove());

  t.logs.forEach(l => {
    const el = document.createElement('div');
    el.className = 'log-entry';
    el.innerHTML = `
      <span class="log-time">${l.time}</span>
      <span class="log-tag ${l.tag}">${l.tagLabel}</span>
      <span class="log-msg">${l.msg}</span>
    `;
    $log.appendChild(el);
  });

  $log.scrollTop = $log.scrollHeight;
}

function selectTest(i) {
  activeIdx = i;
  renderList();
  renderLog();
}

function addLog(idx, tag, tagLabel, msg) {
  const now = new Date();
  const time = now.toTimeString().slice(0, 8);
  state[idx].logs.push({ time, tag, tagLabel, msg });
  if (idx === activeIdx) {
    $empty.style.display = 'none';
    const el = document.createElement('div');
    el.className = 'log-entry';
    el.innerHTML = `
      <span class="log-time">${time}</span>
      <span class="log-tag ${tag}">${tagLabel}</span>
      <span class="log-msg">${msg}</span>
    `;
    $log.appendChild(el);
    $log.scrollTop = $log.scrollHeight;
  }
}

function setStatus(idx, status, duration) {
  state[idx].status = status;
  state[idx].duration = duration;
  renderList();
}

// ─── Helpers ───

function wsUrl(path) {
  return BASE.replace('http://', 'ws://').replace('https://', 'wss://') + path;
}

async function createSession(idx) {
  addLog(idx, 'send', 'HTTP', 'POST /webpilot/sessions');
  const r = await fetch(BASE + '/webpilot/sessions', { method: 'POST' });
  const data = await r.json();
  addLog(idx, 'recv', 'HTTP', `${r.status} — session_id: <code>${data.session_id}</code>`);
  return data.session_id;
}

function wsTask(idx, sid, intent, opts = {}) {
  return new Promise((resolve) => {
    const msgs = [];
    const ws = new WebSocket(wsUrl('/webpilot/ws/' + sid));
    let sentInterrupt = false;
    let sentStop = false;

    addLog(idx, 'info', 'WS', `Connecting to /webpilot/ws/${sid.slice(0,8)}…`);

    ws.onopen = () => {
      addLog(idx, 'send', 'SEND', `task: "${intent}"`);
      ws.send(JSON.stringify({ type: 'task', intent, screenshot: B64_PNG }));
    };

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      msgs.push(msg);

      // Log based on type
      const t = msg.type;
      if (t === 'thinking') {
        addLog(idx, 'thinking', 'THINK', msg.message || 'Processing…');
      } else if (t === 'action') {
        addLog(idx, 'action', 'ACTION', `${msg.action_type || 'unknown'}${msg.url ? ' → ' + msg.url : ''}${msg.selector ? ' @ ' + msg.selector : ''}`);
      } else if (t === 'done') {
        addLog(idx, 'done', 'DONE', msg.message || 'Task complete');
      } else if (t === 'stopped') {
        addLog(idx, 'stopped', 'STOP', msg.message || 'Task stopped');
      } else if (t === 'error') {
        addLog(idx, 'error', 'ERROR', msg.message || 'Error');
      } else if (t === 'confirmation_required') {
        addLog(idx, 'confirm', 'CONFIRM', msg.message || 'Confirmation required');
      } else {
        addLog(idx, 'recv', 'RECV', `type=${t}`);
      }

      // Behaviour hooks
      if (t === 'action' && opts.stopOnAction && !sentStop) {
        sentStop = true;
        addLog(idx, 'send', 'SEND', 'stop');
        ws.send(JSON.stringify({ type: 'stop' }));
      } else if (t === 'action' && opts.interruptOnAction && !sentInterrupt) {
        sentInterrupt = true;
        addLog(idx, 'interrupt', 'SEND', `interrupt: "${opts.interruptText}"`);
        ws.send(JSON.stringify({ type: 'interrupt', instruction: opts.interruptText, screenshot: B64_PNG }));
      } else if (t === 'action') {
        addLog(idx, 'send', 'SEND', 'screenshot (1×1 px)');
        ws.send(JSON.stringify({ type: 'screenshot', screenshot: B64_PNG }));
      }

      if (t === 'confirmation_required') {
        addLog(idx, 'send', 'SEND', 'confirm: true');
        ws.send(JSON.stringify({ type: 'confirm', confirmed: true }));
      }

      if (t === 'done' || t === 'stopped' || t === 'error') {
        ws.close();
        resolve(msgs);
      }
    };

    ws.onerror = () => {
      addLog(idx, 'error', 'ERROR', 'WebSocket connection error');
      resolve(msgs);
    };

    setTimeout(() => { ws.close(); resolve(msgs); }, 15000);
  });
}

// ─── Test implementations ───

async function testHealth(idx) {
  addLog(idx, 'send', 'HTTP', 'GET /health');
  const r = await fetch(BASE + '/health');
  const data = await r.json();
  addLog(idx, 'recv', 'HTTP', `${r.status} — <code>${JSON.stringify(data)}</code>`);
  if (data.status !== 'ok') throw new Error('Health status: ' + data.status);
  if (!data.version) throw new Error('Missing version');
  addLog(idx, 'pass', 'PASS', `status=ok, version=${data.version}`);
}

async function testDocs(idx) {
  addLog(idx, 'info', 'INFO', 'Fetching /docs page via fetch…');
  const r = await fetch(BASE + '/docs');
  const html = await r.text();
  addLog(idx, 'recv', 'HTTP', `${r.status} — ${html.length} bytes`);
  const lower = html.toLowerCase();
  if (!lower.includes('swagger') && !lower.includes('openapi') && !lower.includes('ui navigator')) {
    throw new Error('Docs page missing expected content');
  }
  addLog(idx, 'pass', 'PASS', 'Swagger UI content verified');
}

async function testCreateSession(idx) {
  const sid = await createSession(idx);
  if (!sid) throw new Error('No session_id returned');
  addLog(idx, 'pass', 'PASS', `Session created: <code>${sid.slice(0,8)}…</code>`);
}

async function testLifecycle(idx) {
  const sid = await createSession(idx);
  const msgs = await wsTask(idx, sid, 'Navigate to example.com');
  const types = msgs.map(m => m.type);
  if (!types.includes('thinking')) throw new Error('No thinking message');
  if (!types.includes('done') && !types.includes('action')) throw new Error('No action/done');
  addLog(idx, 'pass', 'PASS', `Lifecycle complete: ${types.join(' → ')}`);
}

async function testStop(idx) {
  const sid = await createSession(idx);
  const msgs = await wsTask(idx, sid, 'test stop flow', { stopOnAction: true });
  const types = msgs.map(m => m.type);
  if (!types.includes('stopped')) throw new Error('No stopped message: ' + types.join(','));
  addLog(idx, 'pass', 'PASS', `Stop received: ${types.join(' → ')}`);
}

async function testConfirm(idx) {
  const sid = await createSession(idx);
  const msgs = await wsTask(idx, sid, 'navigate somewhere');
  const types = msgs.map(m => m.type);
  if (!types.includes('done') && !types.includes('stopped')) throw new Error('No terminal: ' + types.join(','));
  addLog(idx, 'pass', 'PASS', `Confirm flow: ${types.join(' → ')}`);
}

async function testInterrupt(idx) {
  const sid = await createSession(idx);
  const msgs = await wsTask(idx, sid, 'original task', {
    interruptOnAction: true,
    interruptText: 'do something different instead'
  });
  const types = msgs.map(m => m.type);
  const thinkCount = types.filter(t => t === 'thinking').length;
  if (thinkCount < 2) throw new Error('Expected ≥2 thinking (got ' + thinkCount + '): ' + types.join(','));
  addLog(idx, 'pass', 'PASS', `Replan verified: ${thinkCount} thinking phases — ${types.join(' → ')}`);
}

async function testDelete(idx) {
  addLog(idx, 'send', 'HTTP', 'POST /webpilot/sessions');
  const r1 = await fetch(BASE + '/webpilot/sessions', { method: 'POST' });
  const { session_id } = await r1.json();
  addLog(idx, 'recv', 'HTTP', `${r1.status} — session_id: <code>${session_id.slice(0,8)}…</code>`);

  addLog(idx, 'send', 'HTTP', `DELETE /webpilot/sessions/${session_id.slice(0,8)}…`);
  const r2 = await fetch(BASE + '/webpilot/sessions/' + session_id, { method: 'DELETE' });
  addLog(idx, 'recv', 'HTTP', `${r2.status} — deleted`);

  if (r1.status !== 200) throw new Error('Create: ' + r1.status);
  if (r2.status !== 200) throw new Error('Delete: ' + r2.status);
  addLog(idx, 'pass', 'PASS', 'Create 200, Delete 200');
}

async function testConcurrent(idx) {
  addLog(idx, 'info', 'INFO', 'Creating 3 sessions…');
  const sids = [];
  for (let i = 0; i < 3; i++) {
    const r = await fetch(BASE + '/webpilot/sessions', { method: 'POST' });
    const d = await r.json();
    sids.push(d.session_id);
    addLog(idx, 'recv', 'HTTP', `Session ${i+1}: <code>${d.session_id.slice(0,8)}…</code>`);
  }

  addLog(idx, 'info', 'INFO', 'Running 3 tasks in parallel…');

  const runOne = (sid, n) => new Promise((resolve) => {
    const msgs = [];
    const ws = new WebSocket(wsUrl('/webpilot/ws/' + sid));
    ws.onopen = () => {
      ws.send(JSON.stringify({ type: 'task', intent: 'test ' + n, screenshot: B64_PNG }));
    };
    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      msgs.push(msg.type);
      if (msg.type === 'action') {
        ws.send(JSON.stringify({ type: 'screenshot', screenshot: B64_PNG }));
      }
      if (msg.type === 'done' || msg.type === 'stopped') {
        addLog(idx, 'done', `S${n}`, `${msgs.join(' → ')}`);
        ws.close();
        resolve(msgs);
      }
    };
    setTimeout(() => { ws.close(); resolve(msgs); }, 15000);
  });

  const results = await Promise.all(sids.map((sid, i) => runOne(sid, i + 1)));

  for (let i = 0; i < results.length; i++) {
    if (!results[i].includes('done') && !results[i].includes('stopped')) {
      throw new Error(`Session ${i+1} no terminal: ${results[i].join(',')}`);
    }
  }
  addLog(idx, 'pass', 'PASS', 'All 3 sessions completed in parallel');
}

async function testMalformed(idx) {
  const sid = await createSession(idx);

  const result = await new Promise((resolve) => {
    const ws = new WebSocket(wsUrl('/webpilot/ws/' + sid));
    ws.onopen = () => {
      addLog(idx, 'send', 'SEND', '<code>{this is not valid json!!</code>');
      ws.send('{this is not valid json!!');
    };
    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);
      addLog(idx, msg.type === 'error' ? 'error' : 'recv', msg.type === 'error' ? 'ERROR' : 'RECV', msg.message || JSON.stringify(msg));
      ws.close();
      resolve(msg);
    };
    setTimeout(() => { ws.close(); resolve(null); }, 5000);
  });

  if (!result) throw new Error('No response from server');
  if (result.type !== 'error') throw new Error('Expected error, got: ' + result.type);
  addLog(idx, 'pass', 'PASS', 'Server returned error without crashing');
}

const TEST_FNS = [testHealth, testDocs, testCreateSession, testLifecycle, testStop, testConfirm, testInterrupt, testDelete, testConcurrent, testMalformed];

// ─── Runner ───

async function runAll() {
  if (running) return;
  running = true;
  $btn.disabled = true;
  $btn.innerHTML = '&#9632; Running…';
  $banner.classList.remove('visible', 'all-pass', 'has-fail');

  // Reset
  state.forEach(t => { t.status = 'pending'; t.duration = null; t.logs = []; });
  renderList();

  for (let i = 0; i < TESTS.length; i++) {
    selectTest(i);
    setStatus(i, 'running', null);

    const t0 = performance.now();
    try {
      await TEST_FNS[i](i);
      const dur = Math.round(performance.now() - t0);
      setStatus(i, 'pass', dur);
    } catch (err) {
      const dur = Math.round(performance.now() - t0);
      addLog(i, 'fail', 'FAIL', err.message);
      setStatus(i, 'fail', dur);
    }

    // Brief pause between tests for visual effect
    if (i < TESTS.length - 1) {
      await new Promise(r => setTimeout(r, 300));
    }
  }

  // Summary
  const pass = state.filter(t => t.status === 'pass').length;
  const fail = state.filter(t => t.status === 'fail').length;
  const totalDur = state.reduce((s, t) => s + (t.duration || 0), 0);

  $bannerText.textContent = fail === 0 ? `All ${pass} tests passed` : `${fail} of ${pass + fail} tests failed`;
  $bannerDetail.textContent = `Total: ${totalDur}ms`;
  $banner.classList.add('visible', fail === 0 ? 'all-pass' : 'has-fail');

  $btn.disabled = false;
  $btn.innerHTML = '&#9654; Run All';
  running = false;
}

renderList();
